<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fabrication & FX | Erick Morell</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="art-page">

  <!-- SIMPLE HEADER -->
  <header class="sub-header">
    <a href="index.html" class="logo">Erick Morell</a>
    <a href="index.html" class="back-link">← Home</a>
  </header>

  <!-- PAGE TITLE -->
  <section class="page-title">
    <h1>Fabrication & FX</h1>
  </section>

 <!-- FABRICATION ROW -->
<section class="horizontal-section">
  <h2>Fabrication Projects</h2>
  <div class="horizontal-scroll">

    <img 
src="images/fabrication/animatronic-creature/hero.jpg"
class="project-thumb"
data-project="animatronic-creature"
alt="Animatronic Creature"
>

  
  </div>
</section> 

<div id="animatronic-creature-gallery" class="project-gallery" style="display:none;">

<img src="images/fabrication/animatronic-creature/1.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/2.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/3.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/4.jpg" class="lightbox-img">


</div>

<script>
document.querySelectorAll('.project-thumb').forEach(thumb => {

thumb.addEventListener('click', () => {

const project = thumb.dataset.project;

const gallery = document.getElementById(project + '-gallery');

const projectImages = gallery.querySelectorAll('.lightbox-img');

images = projectImages;

currentIndex = 0;

openLightbox();

});

});
</script>

</body>
</html>
