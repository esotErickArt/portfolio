<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fabrication & FX | Erick Morell</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="art-page">

  <!-- SIMPLE HEADER -->
  <header class="sub-header">
    <a href="index.html" class="logo">Erick Morell</a>
    <a href="index.html" class="back-link">← Home</a>
  </header>

  <!-- PAGE TITLE -->
  <section class="page-title">
    <h1>Fabrication & FX</h1>
  </section>

 <!-- FABRICATION ROW -->
<section class="horizontal-section">
  <h2>Fabrication Projects</h2>
  <div class="horizontal-scroll">

    <img 
src="images/fabrication/animatronic-creature/1.jpg"
class="project-thumb"
data-project="animatronic-creature"
alt="Animatronic Creature"
>

  
  </div>
</section> 

<div id="animatronic-creature-gallery" class="project-gallery" style="display:none;">

<img src="images/fabrication/animatronic-creature/1.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/2.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/3.jpg" class="lightbox-img">
<img src="images/fabrication/animatronic-creature/4.jpg" class="lightbox-img">


</div>

<!-- LIGHTBOX MODAL -->

<div id="lightbox" class="lightbox">

  <div class="lightbox-content">

    <span class="lightbox-close">&times;</span>

    <img id="lightbox-img" src="" alt="">

  </div>

</div>

<script>
let images = [];
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxTitle = document.getElementById('lightbox-title');
const lightboxMedium = document.getElementById('lightbox-medium');
const lightboxDesc = document.getElementById('lightbox-desc');
const closeBtn = document.querySelector('.lightbox-close');

let currentIndex = 0;

/* Open lightbox */
images.forEach((img, index) => {
  img.addEventListener('click', () => {
    currentIndex = index;
    openLightbox();
  });
});

function openLightbox() {
  const img = images[currentIndex];

  lightboxImg.src = img.src;
  lightboxTitle.textContent = img.dataset.title;
  lightboxMedium.textContent = img.dataset.medium;
  lightboxDesc.textContent = img.dataset.desc;

  lightbox.classList.add('show');
  document.body.style.overflow = 'hidden';
}

/* Close */
function closeLightbox() {
  lightbox.classList.remove('show');
  document.body.style.overflow = 'auto';
}

closeBtn.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});

/* Keyboard navigation */
document.addEventListener('keydown', e => {

  if (!lightbox.classList.contains('show')) return;

  if (e.key === 'Escape') closeLightbox();

  if (e.key === 'ArrowRight') nextImage();

  if (e.key === 'ArrowLeft') prevImage();

});

/* Next / Prev */
function nextImage() {

  if (currentIndex < images.length - 1) {
    currentIndex++;
    openLightbox();
  }

}

function prevImage() {

  if (currentIndex > 0) {
    currentIndex--;
    openLightbox();
  }

}

/* Swipe (Mobile) */
let startX = 0;

lightbox.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

lightbox.addEventListener('touchend', e => {

  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if (diff > 50) nextImage();     // swipe left
  if (diff < -50) prevImage();   // swipe right

});
</script>
</body>
</html>
